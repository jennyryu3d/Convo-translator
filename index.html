<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover" />
  <meta name="theme-color" content="#F2F5F8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="ConvoTrans" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <title>ConvoTrans — Live conversation translation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="convotrans-design/colors_and_type.css">
  <style>
    html, body {
      margin: 0; padding: 0;
      height: 100%; width: 100%;
      background: #F2F5F8;
      font-family: 'Plus Jakarta Sans', -apple-system, system-ui, sans-serif;
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%;
    }
    * { box-sizing: border-box; }
    button { font-family: inherit; }
    /* fill viewport including iOS safe areas */
    #root { width: 100%; height: 100%; }

    /* Loading splash — the default screen in every state (first open, refresh,
       anytime): blank with the app logo centered. React replaces #root's
       contents on mount, so it disappears automatically once the app is ready. */
    #ct-splash {
      position: fixed; inset: 0; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
      background: #F2F5F8;
    }
    #ct-splash .ct-mark {
      width: 72px; height: 72px; border-radius: 18px;
      box-shadow: 0 8px 22px rgba(8,27,27,0.18);
      animation: ctSplashPulse 1.5s ease-in-out infinite;
    }
    #ct-splash .ct-word {
      font-family: 'Plus Jakarta Sans', -apple-system, system-ui, sans-serif;
      font-weight: 800; font-size: 20px; letter-spacing: -0.3px; color: #203B37;
      margin-bottom: -8px;
    }
    #ct-splash .ct-msg {
      font-family: 'Plus Jakarta Sans', -apple-system, system-ui, sans-serif;
      font-size: 13px; font-weight: 600; color: #5f6f6a;
      text-align: center; line-height: 1.5;
    }
    #ct-splash .ct-msg .ct-hi {
      display: block;
    }
    @keyframes ctSplashPulse {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50%      { transform: scale(1.05); opacity: 1; }
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root">
    <div id="ct-splash">
      <img class="ct-mark" src="convotrans-design/assets/app-icon.png" alt="ConvoTrans" />
      <div class="ct-word">ConvoTrans</div>
      <div class="ct-msg" id="ct-splash-msg">Loading…</div>
    </div>
    <script>
      // Caption explains the situation, in English. A fresh app open shows a
      // welcome; an in-session refresh reassures you're on the latest version.
      (function () {
        try {
          var fresh = !sessionStorage.getItem('ct_session');
          sessionStorage.setItem('ct_session', '1');
          var el = document.getElementById('ct-splash-msg');
          if (el) {
            if (fresh) el.innerHTML = '<span class="ct-hi">Welcome</span>Your live conversation translator';
            else el.textContent = 'Loading the latest version…';
          }
        } catch (e) {}
      })();
    </script>
  </div>

  <script src="js/data.js?v=53"></script>
  <script src="js/history.js?v=44"></script>
  <script src="js/languages.js?v=62"></script>
  <script src="js/api.js?v=45"></script>

  <script type="text/babel" src="tweaks-panel.jsx?v=44"></script>

  <script type="text/babel" src="js/mascot.jsx?v=44"></script>
  <script type="text/babel" src="js/speak.jsx?v=44"></script>
  <script type="text/babel" src="js/recognize.jsx?v=50"></script>
  <script type="text/babel" src="js/drag-scroll.jsx?v=44"></script>
  <script type="text/babel" src="js/lang-chip.jsx?v=47"></script>
  <script type="text/babel" src="js/voice-mode.jsx?v=44"></script>
  <script type="text/babel" src="js/search.jsx?v=53"></script>
  <script type="text/babel" src="js/lang-picker.jsx?v=53"></script>
  <script type="text/babel" src="js/settings-sheet.jsx?v=62"></script>
  <script type="text/babel" src="js/save-convo.jsx?v=57"></script>
  <script type="text/babel" src="js/api-key-banner.jsx?v=53"></script>
  <script type="text/babel" src="js/chat-shell.jsx?v=60"></script>
  <script type="text/babel" src="js/variations.jsx?v=52"></script>
  <script type="text/babel" src="js/live-translator.jsx?v=62"></script>
  <script type="text/babel" src="js/app-production.jsx?v=54"></script>
</body>
</html>
